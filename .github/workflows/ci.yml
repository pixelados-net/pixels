name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: pixels
          POSTGRES_USER: pixels
          POSTGRES_PASSWORD: pixels
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pixels -d pixels"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          cache: true

      - name: Check formatting
        run: test -z "$(gofmt -l .)"

      - name: Vet
        run: go vet ./...

      - name: Validate database migrations
        run: docker run --rm --network host -v "$PWD:/workspace" -w /workspace liquibase/liquibase:4.31 --defaults-file=database/liquibase.ci.properties validate

      - name: Apply database migrations
        run: docker run --rm --network host -v "$PWD:/workspace" -w /workspace liquibase/liquibase:4.31 --defaults-file=database/liquibase.ci.properties update

      - name: Test
        run: |
          set -o pipefail
          go test -race -covermode=atomic -coverprofile=coverage.out ./... | tee coverage.log
          awk '/coverage:/ {
            coverage = $0
            sub(/^.*coverage: /, "", coverage)
            sub(/%.*/, "", coverage)
            score = coverage + 0
            if (score <= 80) {
              print "package coverage must be greater than 80%: " $0
              failed = 1
            }
          } END { exit failed }' coverage.log

      - name: Check coverage
        run: |
          coverage="$(go tool cover -func=coverage.out | awk '/^total:/ {print substr($3, 1, length($3)-1)}')"
          awk -v coverage="$coverage" 'BEGIN { exit !(coverage > 80) }'
