name: Sync Wiki

on:
  push:
    branches: [main]
    paths: ['docs/wiki/**']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-wiki:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync docs/wiki to GitHub Wiki
        run: |
          # The .wiki.git repository only exists after the first wiki page is
          # created manually through the GitHub UI (there is no API for it).
          if ! git clone "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.wiki.git" wiki 2>/dev/null; then
            echo "::warning::Wiki repository not initialized. Open https://github.com/${{ github.repository }}/wiki, click 'Create the first page', save it, then re-run this workflow."
            exit 0
          fi
          rsync -av --delete --exclude .git docs/wiki/ wiki/
          cd wiki
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "docs: sync wiki from ${{ github.sha }}"
          git push
